  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YOUR MENTOR</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#e6f2ff;
}

/* Title */
h1{
    text-align:center;
    padding:15px;
    background:#003366;
    color:white;
    margin:0;
}

/* Tabs */
.tab{
    display:flex;
    justify-content:center;
    background:#0073e6;
    flex-wrap: wrap;
}

.tab button{
    padding:14px 20px;
    border:none;
    background:none;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.tab button:hover{
    background:#0059b3;
}

.tab button.active{
    background:#003366;
}

/* Content */
.content{
    width:100%;
    height:90vh;
    border:none;
}
</style>

</head>

<body>

<h1>YOUR MENTOR</h1>

<div class="tab">
    <button class="tablink active" onclick="openTab('smart')">Smart Management</button>
    <button class="tablink" onclick="openTab('emoji')">Keyword Emoji</button>
    <button class="tablink" onclick="openTab('tech')">Keyword Tech</button>
</div>

<iframe id="frame" class="content"
    src="https://webhide-cyber.github.io/Smart-Management-/">
</iframe>

<script>
function openTab(page){
    const frame = document.getElementById("frame");
    const buttons = document.getElementsByClassName("tablink");

    for(let i=0;i<buttons.length;i++){
        buttons[i].classList.remove("active");
    }

    event.target.classList.add("active");

    if(page === "smart"){
        frame.src = "https://webhide-cyber.github.io/Smart-Management-/";
    } 
    else if(page === "emoji"){
        frame.src = "https://webhide-cyber.github.io/keyword-emoji/";
    } 
    else{
        frame.src = "https://webhide-cyber.github.io/keywords-/";
    }
}
</script>

</body>
</html>
    
  </body>
  
</html>
